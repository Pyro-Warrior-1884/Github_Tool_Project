name: Evaluate Student Code

on:
  push:
    branches:
      - master

jobs:
  send-submission:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout full commit history
        uses: actions/checkout@v3
        with:
          fetch-depth: 2  # So HEAD~1 is available

      - name: Extract Commit Info
        id: extract
        run: |
          echo "COMMITTER=$(git log -1 --pretty=format:'%an')" >> $GITHUB_ENV
          echo "COMMIT_COUNT=$(git rev-list --count HEAD)" >> $GITHUB_ENV

          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)

          # Safe multiline export for file paths
          echo "CHANGED_FILES<<EOF" >> $GITHUB_ENV
          echo "$CHANGED_FILES" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Show Changed Files
        run: |
          echo "Files changed in this commit:"
          echo "$CHANGED_FILES"

      - name: Collect Changed Code Files (.py, .cpp, .java)
        run: |
          mkdir -p encoded
          echo "[]" > encoded/files.json

          for FILE in $CHANGED_FILES; do
            if [[ "$FILE" == *.py || "$FILE" == *.cpp || "$FILE" == *.java ]]; then
              if [ -f "$FILE" ]; then
                CODE=$(base64 < "$FILE" | tr -d '\n')
                jq --arg filename "$FILE" --arg content_b64 "$CODE" \
                   '. += [{filename: $filename, content_b64: $content_b64}]' \
                   encoded/files.json > temp.json && mv temp.json encoded/files.json
              fi
            fi
          done

          echo "CHANGED FILES:"
          echo "$CHANGED_FILES"
          echo "ENCODED FILES CONTENT:"
          cat encoded/files.json

      - name: Send to Backend
        run: |
          JSON=$(jq -n \
            --arg username "$COMMITTER" \
            --arg commitCount "$COMMIT_COUNT" \
            --argjson files "$(cat encoded/files.json)" \
            '{username: $username, commitCount: $commitCount, files: $files}')

          echo "Final JSON Payload:"
          echo "$JSON" | jq .

          curl -v --fail -X POST https://github-server-gwds5fyju-albertnedumudy-5247s-projects.vercel.app/api/submit \
            -H "Content-Type: application/json" \
            -d "$JSON"
