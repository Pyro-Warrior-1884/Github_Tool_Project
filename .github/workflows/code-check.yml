name: Evaluate Student Code

on:
  push:
    branches:
      - master

jobs:
  send-submission:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Extract Commit Info
        id: extract
        run: |
          echo "COMMITTER=$(git log -1 --pretty=format:'%an')" >> $GITHUB_ENV
          echo "COMMIT_COUNT=$(git rev-list --count HEAD)" >> $GITHUB_ENV
          echo "CHANGED_FILES=$(git diff-tree --no-commit-id --name-only -r HEAD)" >> $GITHUB_ENV

      - name: Collect Changed Code Files (.py, .cpp, .java)
        id: collect
        run: |
          mkdir -p encoded
          echo "[" > encoded/files.json
          FIRST=true
          for FILE in $CHANGED_FILES; do
            # Only handle .py, .cpp, .java
            if [[ "$FILE" == *.py || "$FILE" == *.cpp || "$FILE" == *.java ]]; then
              if [ -f "$FILE" ]; then
                CODE=$(base64 -w 0 "$FILE")
                if [ "$FIRST" = true ]; then
                  FIRST=false
                else
                  echo "," >> encoded/files.json
                fi
                echo "  {\"filename\": \"${FILE}\", \"content_b64\": \"${CODE}\"}" >> encoded/files.json
              fi
            fi
          done
          echo "]" >> encoded/files.json

      - name: Send to Backend
        run: |
          JSON=$(jq -n \
            --arg username "$COMMITTER" \
            --arg commitCount "$COMMIT_COUNT" \
            --argjson files "$(cat encoded/files.json)" \
            '{username: $username, commitCount: $commitCount, files: $files}')

          echo "Sending Payload:"
          echo "$JSON"

          curl -X POST https://github-server-2zbbyg128-albertnedumudy-5247s-projects.vercel.app/api/submit \
            -H "Content-Type: application/json" \
            -d "$JSON"
